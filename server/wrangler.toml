name = "ai-navigator-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "DEVICES"
id = "PLACEHOLDER_REPLACE_AFTER_wrangler_kv_namespace_create"
preview_id = "PLACEHOLDER_REPLACE_AFTER_wrangler_kv_namespace_create_preview"

[vars]
OPENROUTER_BASE = "https://openrouter.ai/api/v1"
FREE_MODEL = "meta-llama/llama-3.2-11b-vision-instruct:free"
FREE_REQUEST_LIMIT = "50"

# Secrets — set via CLI, never commit:
#   wrangler secret put OPENROUTER_API_KEY
