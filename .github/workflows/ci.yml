name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SUPABASE_URL: https://gwekzberpfuxsoddwwqj.supabase.co
  SUPABASE_BUCKET: releases

jobs:
  # ── Fast check on every push / PR ────────────────────────────────────────────
  check:
    name: Check & lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (type-check + bundle)
        run: pnpm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-features

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-features -- -D warnings

  # ── Full Tauri build on every push to main ────────────────────────────────────
  build:
    name: Build (unsigned)
    runs-on: windows-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build -- --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: navisual-unsigned-${{ github.sha }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14

  # ── Signed release build on semver tag ───────────────────────────────────────
  release:
    name: Release
    runs-on: windows-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # to create GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      # Upload versioned installer + stable "latest" alias to Supabase Storage
      # Requires: Settings → Secrets → SUPABASE_SERVICE_KEY (service_role key)
      # Requires: Supabase dashboard → Storage → bucket "releases" → Public ON
      - name: Upload installer to Supabase Storage
        shell: pwsh
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          $headers = @{
            "Authorization" = "Bearer $env:SUPABASE_SERVICE_KEY"
            "Content-Type"  = "application/octet-stream"
            "x-upsert"      = "true"
          }
          $base = "$env:SUPABASE_URL/storage/v1/object/$env:SUPABASE_BUCKET"
          $exePath = "${{ steps.installer.outputs.path }}"
          $exeName = "${{ steps.installer.outputs.name }}"

          # Versioned copy (e.g. Navisual_0.5.0_x64-setup.exe)
          Invoke-RestMethod -Uri "$base/$exeName" -Method Post -Headers $headers -InFile $exePath
          # Stable alias — website always links here
          Invoke-RestMethod -Uri "$base/Navisual-latest-setup.exe" -Method Post -Headers $headers -InFile $exePath

      # Write and upload updater manifest
      - name: Upload latest.json to Supabase Storage
        shell: pwsh
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exeName = "${{ steps.installer.outputs.name }}"
          $sig = Get-Content "${{ steps.installer.outputs.path }}.sig" -Raw -ErrorAction SilentlyContinue

          $downloadUrl = "$env:SUPABASE_URL/storage/v1/object/public/$env:SUPABASE_BUCKET/$exeName"

          $manifest = @{
            version   = $version
            notes     = "See https://github.com/NavisualGuide/navisual/releases/tag/v$version"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                url       = $downloadUrl
                signature = if ($sig) { $sig.Trim() } else { "" }
              }
            }
          } | ConvertTo-Json -Depth 5
          $manifest | Out-File -FilePath latest.json -Encoding utf8

          $headers = @{
            "Authorization" = "Bearer $env:SUPABASE_SERVICE_KEY"
            "Content-Type"  = "application/json"
            "x-upsert"      = "true"
          }
          Invoke-RestMethod -Uri "$env:SUPABASE_URL/storage/v1/object/$env:SUPABASE_BUCKET/latest.json" -Method Post -Headers $headers -InFile "latest.json"

      # Private GitHub Release for internal tracking / changelog
      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          name: "Navisual v${{ steps.version.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: src-tauri/target/release/bundle/nsis/*.exe
