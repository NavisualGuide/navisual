name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Fast check on every push / PR ────────────────────────────────────────────
  check:
    name: Check & lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (type-check + bundle)
        run: pnpm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-features

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-features -- -D warnings

  # ── Signed release build on semver tag ───────────────────────────────────────
  release:
    name: Release
    runs-on: windows-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      contents: write   # to create GitHub Release
      id-token: write   # required for azure/login@v2 federated OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # ── Azure Trusted Signing ─────────────────────────────────────────────
      # Authenticode-sign the NSIS installer so Windows SmartScreen trusts it.
      # Must run BEFORE the updater .sig is regenerated (next step), because
      # signing modifies the .exe bytes and invalidates any earlier .sig.
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Tauri installer (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: 'https://wus2.codesigning.azure.net/'
          trusted-signing-account-name: 'navisualsigning'
          certificate-profile-name: 'NavisualGuideProfile'
          files-folder: './src-tauri/target/release/bundle/nsis'
          files-folder-filter: 'exe'

      # Tauri's updater .sig was generated from the unsigned .exe during
      # `tauri build`. Azure signing changed the .exe bytes, so we must
      # regenerate the .sig against the signed binary or auto-updates fail.
      - name: Regenerate updater signature for signed installer
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          pnpm tauri signer sign --private-key $env:TAURI_SIGNING_PRIVATE_KEY --password $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD $exe.FullName

      # Prepare release assets: keep the versioned installer (and its .sig)
      # for traceability, plus stable-named copies so the website + updater
      # can use a URL that doesn't change every release.
      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$bundleDir/*.exe" | Select-Object -First 1
          $sig = "$($exe.FullName).sig"

          $stableExe = Join-Path $bundleDir "Navisual-Setup.exe"
          $stableSig = Join-Path $bundleDir "Navisual-Setup.exe.sig"
          Copy-Item $exe.FullName $stableExe -Force
          Copy-Item $sig          $stableSig -Force

          echo "versioned_exe=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "versioned_sig=$sig"             >> $env:GITHUB_OUTPUT
          echo "stable_exe=$stableExe"          >> $env:GITHUB_OUTPUT
          echo "stable_sig=$stableSig"          >> $env:GITHUB_OUTPUT

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sig = Get-Content "${{ steps.assets.outputs.stable_sig }}" -Raw -ErrorAction SilentlyContinue

          # Stable URL — points to the latest published release's stable-named asset.
          $downloadUrl = "https://github.com/NavisualGuide/navisual/releases/latest/download/Navisual-Setup.exe"

          $manifest = @{
            version   = $version
            notes     = "See https://github.com/NavisualGuide/navisual/releases/tag/v$version"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                url       = $downloadUrl
                signature = if ($sig) { $sig.Trim() } else { "" }
              }
            }
          } | ConvertTo-Json -Depth 5
          $manifest | Out-File -FilePath latest.json -Encoding utf8

      # Publish GitHub Release with all assets. Auto-marked as "latest" by
      # GitHub when the tag is the highest semver. The stable URLs
      #   .../releases/latest/download/Navisual-Setup.exe
      #   .../releases/latest/download/latest.json
      # are used by the website and the Tauri auto-updater respectively.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Navisual v${{ steps.version.outputs.version }}"
          draft: false
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.versioned_exe }}
            ${{ steps.assets.outputs.versioned_sig }}
            ${{ steps.assets.outputs.stable_exe }}
            ${{ steps.assets.outputs.stable_sig }}
            latest.json
