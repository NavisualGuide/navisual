name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Fast check on every push / PR ────────────────────────────────────────────
  check:
    name: Check & lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend (type-check + bundle)
        run: npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-features

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-features -- -D warnings

  # ── Full Tauri build on every push to main ────────────────────────────────────
  build:
    name: Build (unsigned)
    runs-on: windows-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles nsis,msi
        env:
          # Disable updater signature check for unsigned dev builds
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: navisual-unsigned-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 14

  # ── Signed release build on semver tag ───────────────────────────────────────
  release:
    name: Release
    runs-on: windows-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # to create GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app (signed)
        run: npm run tauri build -- --bundles nsis,msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Navisual v${{ steps.version.outputs.version }}"
          draft: true          # review before publishing
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Write updater manifest (latest.json)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $sig = Get-Content "$($exe.FullName).sig" -Raw -ErrorAction SilentlyContinue
          $manifest = @{
            version  = $version
            notes    = "See https://github.com/NavisualGuide/navisual/releases/tag/v$version"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                url       = "https://github.com/NavisualGuide/navisual/releases/download/v$version/$($exe.Name)"
                signature = $sig.Trim()
              }
            }
          } | ConvertTo-Json -Depth 5
          $manifest | Out-File -FilePath latest.json -Encoding utf8

      - name: Upload updater manifest
        uses: actions/upload-artifact@v4
        with:
          name: latest-json
          path: latest.json
