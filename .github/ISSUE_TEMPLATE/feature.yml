name: Feature / idea
description: Suggest an improvement
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need, not the proposed solution
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional — how you'd see it working
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — what else have you tried or thought about?
