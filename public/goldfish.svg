<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Spherical body shading: lit from top-left -->
    <radialGradient id="body" cx="36%" cy="28%" r="80%">
      <stop offset="0%"  stop-color="#FFE98C"/>
      <stop offset="38%" stop-color="#FFB13E"/>
      <stop offset="74%" stop-color="#FB7B18"/>
      <stop offset="100%" stop-color="#D5470A"/>
    </radialGradient>
    <linearGradient id="tail" x1="18%" y1="6%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFC64F"/>
      <stop offset="55%" stop-color="#FB8A1E"/>
      <stop offset="100%" stop-color="#E2560C"/>
    </linearGradient>
    <linearGradient id="fin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFD074"/>
      <stop offset="55%" stop-color="#FF992E"/>
      <stop offset="100%" stop-color="#EC6411"/>
    </linearGradient>
    <radialGradient id="gloss" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#FFFDF3" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="belly" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFE7A2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFE7A2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="occ" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#8E2A03" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8E2A03" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF7A2E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF7A2E" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- Background: dark rounded square (Navisual theme) -->
  <rect width="512" height="512" rx="112" ry="112" fill="#18181B"/>

  <!-- Warm halo so the fish reads as lit / floating -->
  <ellipse cx="226" cy="262" rx="210" ry="150" fill="url(#halo)"/>

  <!-- Contact shadow grounding the fish in 3D -->
  <ellipse cx="236" cy="406" rx="150" ry="26" fill="#000000" opacity="0.30" filter="url(#shadow)"/>

  <!-- ============ TAIL (behind body) ============ -->
  <g>
    <!-- upper lobe -->
    <path d="M 342,250
             C 372,222 398,192 432,158
             C 450,140 468,148 458,176
             C 446,212 414,244 372,262 Z"
          fill="url(#tail)"/>
    <!-- lower lobe -->
    <path d="M 342,278
             C 372,306 398,336 432,370
             C 450,388 468,380 458,352
             C 446,316 414,284 372,266 Z"
          fill="url(#tail)"/>
    <!-- tail fin rays -->
    <g stroke="#C9510C" stroke-width="5" stroke-linecap="round" opacity="0.55" fill="none">
      <path d="M 372,256 C 404,232 430,206 452,176"/>
      <path d="M 372,262 C 408,246 432,226 450,202"/>
      <path d="M 372,272 C 408,288 432,308 450,332"/>
      <path d="M 372,278 C 404,302 430,328 452,358"/>
    </g>
  </g>

  <!-- ============ DORSAL FIN (behind body) ============ -->
  <!-- tall rounded sail sitting on the back ridge -->
  <path d="M 168,166
           C 190,112 224,86 252,94
           C 286,104 300,140 300,166
           C 262,150 208,150 168,166 Z"
        fill="url(#fin)"/>
  <!-- lighter inner sheen on the fin -->
  <path d="M 186,160 C 204,122 230,104 252,110 C 234,116 208,128 186,160 Z"
        fill="#FFD27A" opacity="0.55"/>
  <!-- fin rays -->
  <g stroke="#CC5410" stroke-width="4.5" stroke-linecap="round" opacity="0.5" fill="none">
    <path d="M 198,150 C 210,120 222,104 236,98"/>
    <path d="M 232,146 C 244,120 258,108 270,112"/>
    <path d="M 266,150 C 278,128 288,120 296,128"/>
  </g>

  <!-- ============ BODY ============ -->
  <!-- darker rim = 3D thickness, offset down-right -->
  <ellipse cx="218" cy="272" rx="148" ry="118" fill="#C2460A"/>
  <!-- main lit body -->
  <ellipse cx="214" cy="266" rx="146" ry="116" fill="url(#body)"/>
  <!-- bottom ambient occlusion -->
  <ellipse cx="232" cy="332" rx="132" ry="78" fill="url(#occ)"/>
  <!-- belly bounce light -->
  <ellipse cx="206" cy="300" rx="120" ry="74" fill="url(#belly)"/>
  <!-- glossy top-left sheen -->
  <ellipse cx="168" cy="206" rx="104" ry="62" fill="url(#gloss)" transform="rotate(-18 168 206)"/>
  <!-- crisp specular dot -->
  <ellipse cx="150" cy="190" rx="26" ry="15" fill="#FFFFFF" opacity="0.75" transform="rotate(-20 150 190)"/>
  <!-- warm rim light along the lower-right edge -->
  <path d="M 330,300 C 304,344 258,366 206,362"
        fill="none" stroke="#FFE3A0" stroke-width="11" stroke-linecap="round"
        opacity="0.5" filter="url(#soft)"/>

  <!-- ============ PECTORAL FIN (in front) ============ -->
  <path d="M 198,312
           C 244,360 238,408 198,398
           C 166,388 162,338 198,312 Z"
        fill="url(#fin)" opacity="0.95"/>
  <path d="M 206,328 C 226,356 226,386 208,392"
        fill="none" stroke="#C9510C" stroke-width="4.5" stroke-linecap="round" opacity="0.45"/>

  <!-- cheek blush (cartoon warmth) -->
  <ellipse cx="150" cy="296" rx="30" ry="22" fill="#FF6A45" opacity="0.22" filter="url(#soft)"/>

  <!-- ============ EYE (big & glossy) ============ -->
  <circle cx="120" cy="232" r="40" fill="#FFFFFF"/>
  <circle cx="120" cy="232" r="40" fill="none" stroke="#E8C77A" stroke-width="2" opacity="0.6"/>
  <circle cx="126" cy="236" r="26" fill="#141414"/>
  <circle cx="135" cy="223" r="12" fill="#FFFFFF"/>
  <circle cx="113" cy="247" r="5"  fill="#FFFFFF" opacity="0.85"/>

  <!-- ============ MOUTH (lips) ============ -->
  <!-- lower lip (fuller, rosy) -->
  <path d="M 50,275
           C 56,288 76,290 86,279
           C 75,283 60,282 52,276 Z"
        fill="#D2542C"/>
  <!-- upper lip -->
  <path d="M 50,275
           C 56,265 76,263 86,273
           C 75,269 60,270 52,275 Z"
        fill="#B23F1B"/>
  <!-- mouth opening / lip line -->
  <path d="M 52,276 C 64,278 76,278 86,276"
        fill="none" stroke="#6E2606" stroke-width="2.5" stroke-linecap="round"/>
  <!-- lower-lip gloss -->
  <path d="M 60,283 C 68,285 77,284 81,281"
        fill="none" stroke="#FF9A60" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
</svg>
